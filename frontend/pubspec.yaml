name: brainsync_ai
description: AI-Powered Study Companion — Flutter App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  dio: ^5.4.3
  flutter_riverpod: ^2.5.1
  go_router: ^13.2.1
  shared_preferences: ^2.2.3
  file_picker: ^8.0.3
  flutter_markdown: ^0.6.22
  shimmer: ^3.0.0
  lottie: ^3.1.0
  fl_chart: ^0.67.0
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  cached_network_image: ^3.3.1
  intl: ^0.19.0
  logger: ^2.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/
